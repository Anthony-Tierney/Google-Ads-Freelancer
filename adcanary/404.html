<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Page not found — AdCanary</title>
<style>
  :root {
    --ink: #0f172a;
    --muted: #64748b;
    --faint: #94a3b8;
    --line: #e2e8f0;
    --bg: #f6f7f9;
    --panel: #ffffff;
    --accent: #4338ca;
    --accent-soft: #eef2ff;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(15,23,42,.04), 0 4px 16px rgba(15,23,42,.05);
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  html.dark {
    --ink: #f6f7f9;
    --muted: #94a3b8;
    --faint: #64748b;
    --line: #334155;
    --bg: #0f172a;
    --panel: #1e293b;
    --accent: #6366f1;
    --accent-soft: #312e81;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--sans); color: var(--ink); background: var(--bg);
    -webkit-font-smoothing: antialiased; font-size: 14px; line-height: 1.45;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 40px 44px; max-width: 420px; width: 100%; text-align: center;
  }
  .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 26px; }
  .logo-mark {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #7c5cff);
    display: flex; align-items: center; justify-content: center; color: #fff; flex: none;
  }
  .logo-mark svg { width: 17px; height: 17px; }
  .logo-text { font-size: 16.5px; font-weight: 600; letter-spacing: -0.01em; }
  .logo-text b { color: var(--accent); font-weight: 700; }
  .code {
    font-size: 56px; font-weight: 700; letter-spacing: -0.03em; line-height: 1;
    font-variant-numeric: tabular-nums; color: var(--accent); margin: 0 0 10px;
  }
  h1 { font-size: 17px; font-weight: 600; margin: 0 0 8px; }
  p { color: var(--muted); margin: 0 0 26px; }
  .btn {
    display: inline-block; padding: 9px 18px; border-radius: 8px; text-decoration: none;
    background: var(--accent); color: #fff; font-weight: 560; font-size: 14px;
    transition: filter .15s ease;
  }
  .btn:hover { filter: brightness(1.08); }
</style>
</head>
<body>
  <main class="card">
    <div class="logo">
      <span class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V11M10 20V4M16 20v-6M22 20H2"/></svg></span>
      <span class="logo-text">Ad<b>Canary</b></span>
    </div>
    <p class="code">404</p>
    <h1>This page flew the coop</h1>
    <p>The page you're looking for doesn't exist or has moved.</p>
    <a class="btn" href="/">Back to dashboard</a>
  </main>
  <script>
    if (localStorage.getItem("dashboardDarkMode") === "true") {
      document.documentElement.classList.add("dark");
    }
  </script>
</body>
</html>
